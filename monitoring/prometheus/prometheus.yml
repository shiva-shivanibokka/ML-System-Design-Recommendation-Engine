global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "recsys-gateway"
    static_configs:
      - targets: ["gateway:8000"]
    metrics_path: /metrics

  - job_name: "kafka"
    static_configs:
      - targets: ["kafka:9308"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]
